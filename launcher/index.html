<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codebase Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: hsl(0 0% 4%);
      color: hsl(0 0% 93%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 0 24px;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      border-radius: 16px;
      background: hsl(0 0% 10%);
      border: 1px solid hsl(0 0% 16%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 32px;
      height: 32px;
      stroke: hsl(0 0% 60%);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      color: hsl(0 0% 93%);
    }

    .subtitle {
      font-size: 13px;
      color: hsl(0 0% 45%);
      line-height: 1.5;
      margin-bottom: 36px;
    }

    .pick-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 600;
      color: hsl(0 0% 4%);
      background: hsl(0 0% 90%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
    }

    .pick-btn:hover {
      background: hsl(0 0% 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }

    .pick-btn:active { transform: translateY(0); }

    .pick-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status {
      margin-top: 32px;
      font-size: 12px;
      color: hsl(0 0% 35%);
      min-height: 20px;
      transition: color 0.2s;
    }

    .status.active { color: hsl(0 0% 55%); }
    .status.error { color: hsl(0 50% 60%); }
    .status.success { color: hsl(140 40% 55%); }

    .progress {
      width: 200px;
      height: 2px;
      background: hsl(0 0% 12%);
      border-radius: 1px;
      margin: 16px auto 0;
      overflow: hidden;
      display: none;
    }

    .progress.visible { display: block; }

    .progress-bar {
      height: 100%;
      background: hsl(0 0% 50%);
      border-radius: 1px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .api-key-section {
      margin-top: 40px;
      padding: 16px 20px;
      background: hsl(0 0% 7%);
      border: 1px solid hsl(0 0% 12%);
      border-radius: 12px;
      text-align: left;
      display: none;
    }

    .api-key-section.visible { display: block; }

    .api-key-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: hsl(0 0% 50%);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .api-key-row {
      display: flex;
      gap: 8px;
    }

    .api-key-input {
      flex: 1;
      padding: 10px 12px;
      font-size: 12px;
      font-family: monospace;
      color: hsl(0 0% 80%);
      background: hsl(0 0% 10%);
      border: 1px solid hsl(0 0% 18%);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }

    .api-key-input:focus { border-color: hsl(0 0% 35%); }
    .api-key-input::placeholder { color: hsl(0 0% 30%); }

    .api-key-save {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: hsl(0 0% 70%);
      background: hsl(0 0% 12%);
      border: 1px solid hsl(0 0% 18%);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .api-key-save:hover {
      background: hsl(0 0% 16%);
      color: hsl(0 0% 90%);
    }

    .api-key-hint {
      margin-top: 10px;
      font-size: 11px;
      color: hsl(0 0% 35%);
      line-height: 1.5;
    }

    .api-key-hint a {
      color: hsl(0 0% 55%);
      text-decoration: none;
    }

    .api-key-hint a:hover { text-decoration: underline; }

    .skip-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      color: hsl(0 0% 30%);
      cursor: pointer;
      transition: color 0.15s;
    }

    .skip-link:hover { color: hsl(0 0% 50%); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulsing { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <circle cx="5" cy="6" r="2"/>
        <circle cx="19" cy="6" r="2"/>
        <circle cx="12" cy="18" r="2"/>
        <line x1="5" y1="8" x2="12" y2="16"/>
        <line x1="19" y1="8" x2="12" y2="16"/>
        <line x1="7" y1="6" x2="17" y2="6"/>
      </svg>
    </div>

    <h1>Codebase Visualizer</h1>
    <p class="subtitle">Pick your project folder and see its structure as an interactive diagram.</p>

    <button class="pick-btn" id="pickBtn" onclick="pickFolder()">
      <svg viewBox="0 0 24 24">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      Choose Project Folder
    </button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status" id="status"></div>

    <div class="api-key-section" id="apiKeySection">
      <label>Anthropic API Key (optional)</label>
      <div class="api-key-row">
        <input type="password" class="api-key-input" id="apiKeyInput" placeholder="sk-ant-..." />
        <button class="api-key-save" onclick="saveApiKey()">Save</button>
      </div>
      <div class="api-key-hint">
        Enables AI descriptions and Q&A. <a href="https://console.anthropic.com/settings/keys" target="_blank">Get a key</a>
      </div>
      <div class="skip-link" onclick="openVisualizer()">Skip, open without AI features</div>
    </div>
  </div>

  <script>
    let selectedPath = null;

    async function pickFolder() {
      setStatus('Opening folder picker...', 'active');
      try {
        const data = await window.api.pickFolder();
        if (data.cancelled) { setStatus(''); return; }
        if (data.error) { setStatus(data.error, 'error'); return; }
        selectedPath = data.path;
        await startAnalysis(data.path);
      } catch (err) {
        setStatus('Failed to open folder picker', 'error');
      }
    }

    async function startAnalysis(folderPath) {
      const btn = document.getElementById('pickBtn');
      btn.disabled = true;
      btn.style.opacity = '0.5';

      showProgress(10);
      setStatus('Initializing project...', 'active pulsing');

      try {
        const initData = await window.api.initProject(folderPath);
        if (initData.error) {
          setStatus(initData.error, 'error');
          btn.disabled = false;
          btn.style.opacity = '1';
          return;
        }

        showProgress(40);
        setStatus('Analyzing codebase...', 'active pulsing');

        const analyzeData = await window.api.analyzeProject(folderPath);
        if (analyzeData.error) {
          setStatus(analyzeData.error, 'error');
          btn.disabled = false;
          btn.style.opacity = '1';
          return;
        }

        showProgress(100);
        setStatus(`Found ${analyzeData.nodes} files, ${analyzeData.edges} connections`, 'success');

        document.getElementById('apiKeySection').classList.add('visible');
      } catch (err) {
        setStatus('Analysis failed: ' + err.message, 'error');
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    }

    async function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return;
      await window.api.saveApiKey({ key, path: selectedPath });
      openVisualizer();
    }

    async function openVisualizer() {
      setStatus('Starting visualizer...', 'active pulsing');
      const result = await window.api.startVisualizer(selectedPath);
      if (result.error) {
        setStatus(result.error, 'error');
        return;
      }
      setStatus('Visualizer running!', 'success');
      setTimeout(() => {
        window.api.openExternal(result.url);
      }, 1500);
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }

    function showProgress(pct) {
      const container = document.getElementById('progress');
      const bar = document.getElementById('progressBar');
      container.classList.add('visible');
      bar.style.width = pct + '%';
    }
  </script>
</body>
</html>
